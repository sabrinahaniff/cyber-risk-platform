version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/cyber_risk_db
      - SPRING_DATASOURCE_USERNAME=cyberrisk
      - SPRING_DATASOURCE_PASSWORD=password123
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cyber_risk_db
      - POSTGRES_USER=cyberrisk
      - POSTGRES_PASSWORD=password123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberrisk -d cyber_risk_db"]
      interval: 5s
      timeout: 5s
      retries: 5